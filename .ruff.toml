line-length = 88
target-version = "py313"
extend-exclude = ["*.mdx"]

[format]
quote-style = "double"
indent-style = "space"

[lint]
extend-select = [
    "E", "W", "F", "I", "UP", "B", "C4", "SIM", "RUF", "PERF", "FURB",
    "S", "TRY", "RSE", "EM", "N", "A", "Q", "COM", "RET", "ARG", "PTH",
    "T20", "LOG", "G", "TCH", "ANN", "PT", "D", "ERA",
    "PLC", "PLE", "PLR", "PLW",
    "PIE", "ISC", "ICN", "PGH", "FLY", "SLF", "TD", "FIX",
    "YTT", "DTZ", "EXE", "FA", "INT", "INP",
]
ignore = [
    "E501",
    "COM812",
    "ISC001",
    "D100",
    "D104",
    "D203",
    "D213",
    "ANN401",
    "TD002",
    "TD003",
    "FIX002",
    "PLR0913",
    "PLR0912",
    "PLR0915",
    "ARG002",
]

[lint.per-file-ignores]
"tests/**" = [
    "S101",
    "SLF001",
    "ARG001",
    "ARG002",
    "ANN",
    "D",
    "PLR2004",
    "TCH",
]
"**/conftest.py" = [
    "ARG001",
    "ARG002",
    "ANN",
    "D",
]
"**/__init__.py" = [
    "F401",
    "D104",
]
"scripts/**" = [
    "T201",
    "INP001",
]

[lint.isort]
split-on-trailing-comma = true
combine-as-imports = true

[lint.pydocstyle]
convention = "google"

[lint.pylint]
max-args = 7
max-returns = 6
max-branches = 15

[lint.mccabe]
max-complexity = 15
